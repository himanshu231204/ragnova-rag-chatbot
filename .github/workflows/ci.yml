name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          python -m py_compile app.py streamlit_app.py src/__init__.py src/rag/data_loader.py src/rag/embedding.py src/rag/search.py src/rag/vectorstore.py src/ui/config.py src/ui/styles.py src/ui/sidebar.py src/ui/pages/chat.py src/ui/pages/about.py src/ui/pages/developer.py src/backend/index_manager.py src/backend/rag_client.py
