name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py streamlit_app.py src/__init__.py src/data_loader.py src/embedding.py src/search.py src/vectorstore.py

      - name: API contract check
        run: |
          python -c "import inspect; from src.search import RAGSearch; sig = inspect.signature(RAGSearch.search_and_summarize); assert 'response_mode' in sig.parameters, 'search_and_summarize must accept response_mode'; print('Contract OK:', sig)"
